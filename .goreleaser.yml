version: 2

builds:
  - id: flares
    main: ./cmd/flares
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
    goos:
      - linux
      - darwin
      - freebsd
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: flares
    formats:
      - tar.gz
    name_template: >-
      flares_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Version }}-SNAPSHOT-{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^refactor:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: lfaoro
    name: flares

homebrew_casks:
  - name: flares
    repository:
      owner: lfaoro
      name: tap
    commit_author:
      name: Leonardo Faoro
      email: flares@leonardofaoro.com
    description: "Cloudflare DNS backup tool — export DNS records as BIND zone files"
    homepage: "https://github.com/lfaoro/flares"
    license: "MIT"

scoops:
  - name: flares
    repository:
      owner: lfaoro
      name: tap
    directory: scoop
    commit_author:
      name: Leonardo Faoro
      email: flares@leonardofaoro.com
    description: "Cloudflare DNS backup tool — export DNS records as BIND zone files"
    homepage: "https://github.com/lfaoro/flares"
    license: "MIT"

aurs:
  - name: flares
    commit_author:
      name: Leonardo Faoro
      email: flares@leonardofaoro.com
    description: "Cloudflare DNS backup tool — export DNS records as BIND zone files"
    homepage: "https://github.com/lfaoro/flares"
    license: "MIT"
    maintainers:
      - "Leonardo Faoro <flares@leonardofaoro.com>"

nix:
  - name: flares
    repository:
      owner: lfaoro
      name: tap
    commit_author:
      name: Leonardo Faoro
      email: flares@leonardofaoro.com
    description: "Cloudflare DNS backup tool — export DNS records as BIND zone files"
    homepage: "https://github.com/lfaoro/flares"
    license: "mit"

winget:
  - name: lfaoro.flares
    repository:
      owner: lfaoro
      name: tap
    commit_author:
      name: Leonardo Faoro
      email: flares@leonardofaoro.com
    publisher: "Leonardo Faoro"
    publisher_url: "https://github.com/lfaoro/tap"
    publisher_support_url: "https://github.com/lfaoro/flares/issues"
    description: "Cloudflare DNS backup tool — export DNS records as BIND zone files"
    short_description: "Cloudflare DNS backup tool"
    homepage: "https://github.com/lfaoro/flares"
    license: "MIT"
    tags:
      - cloudflare
      - dns
      - backup
      - bind
      - zone

dockers_v2:
  - images:
      - ghcr.io/lfaoro/flares
    tags:
      - "{{ .Version }}"
      - "{{ if not .IsNightly }}latest{{ end }}"
      - "{{ if not .IsNightly }}{{ .Major }}.{{ .Minor }}{{ end }}"
    dockerfile: Dockerfile
    labels:
      "org.opencontainers.image.title": "Flares"
      "org.opencontainers.image.description": "Cloudflare DNS backup tool"
      "org.opencontainers.image.url": "https://github.com/lfaoro/flares"
      "org.opencontainers.image.source": "https://github.com/lfaoro/flares"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.licenses": "MIT"
