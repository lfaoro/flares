name: Smoke Test

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  cli:
    name: CLI (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Build and install
        shell: bash
        run: |
          EXE="$(go env GOEXE)"
          mkdir -p "$HOME/bin"
          go build -o "$HOME/bin/flares$EXE" ./cmd/flares
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Test version
        run: flares --version

      - name: Test help
        run: flares --help

      - name: Test subcommand help
        run: |
          flares show --help
          flares export --help
          flares zones --help

      - name: Test missing token error
        run: |
          output=$(flares --token "" show example.com 2>&1 || true)
          echo "$output" | grep -q "provide --token"

      - name: Test missing domain error
        run: |
          output=$(flares --token x show 2>&1 || true)
          echo "$output" | grep -q "at least one domain"

      - name: Test help on no subcommand
        run: flares

  install-script:
    name: Install Script
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Wait for release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = process.env.GITHUB_REF_NAME;
            for (let i = 0; i < 30; i++) {
              try {
                await github.rest.repos.getReleaseByTag({ owner: context.repo.owner, repo: context.repo.repo, tag });
                return;
              } catch {
                await new Promise(r => setTimeout(r, 10000));
              }
            }
            core.setFailed('Release not found after 5 minutes');

      - name: Install via script
        run: |
          curl -sfL https://github.com/lfaoro/flares/releases/latest/download/install.sh | sh -s -- -b /tmp/flares-test
          /tmp/flares-test/flares --version

      - name: Test specific version
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          curl -sfL https://github.com/lfaoro/flares/releases/latest/download/install.sh | sh -s -- -b /tmp/flares-version "$VERSION"
          /tmp/flares-version/flares --version | grep -q "$VERSION"
