name: Security

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  govulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1

  gosec:
    name: gosec
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run gosec
        uses: securego/gosec@v2
        with:
          args: ./...
